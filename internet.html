<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tiny Internet - DrAg0n</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    
    #browser-window {
      width: 90vw;
      height: 90vh;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    #browser-header {
      background: rgba(15, 23, 42, 0.9);
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
    }

    .browser-btn {
      background: transparent;
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 5px;
      border-radius: 50%;
    }

    .browser-btn:hover {
      background: rgba(255,255,255,0.1);
    }

    #browser-url {
      flex: 1;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      color: white;
      padding: 8px 15px;
      border-radius: 20px;
      font-family: monospace;
      font-size: 0.9rem;
    }

    #browser-content {
      flex: 1;
      overflow-y: auto;
      background: #090d16; /* Deep dark space background */
      color: #e2e8f0;      /* Light text */
      position: relative;
    }

    /* Fake Site Styles */
    .fake-site {
      padding: 2rem;
      min-height: 100%;
    }

    /* DragonSearch */
    .ds-logo { font-size: 4rem; text-align: center; margin-top: 10vh; color: #38bdf8; font-weight: bold; text-shadow: 0 0 20px rgba(56,189,248,0.3); }
    .ds-input { width: 50%; padding: 15px; border-radius: 30px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: white; font-size: 1.2rem; display: block; margin: 20px auto; outline: none; }
    .ds-input:focus { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56,189,248,0.3); }
    .ds-btn { display: block; margin: 0 auto; padding: 10px 20px; background: rgba(255,255,255,0.08); border: 1px solid var(--border); color: white; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
    .ds-btn:hover { background: rgba(255,255,255,0.15); border-color: #38bdf8; }
    
    .ds-results { max-width: 800px; margin: 20px auto; }
    .ds-result { margin-bottom: 25px; padding: 15px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; }
    .ds-link { color: #38bdf8; font-size: 1.2rem; text-decoration: none; display: block; margin-bottom: 5px;}
    .ds-link:hover { text-decoration: underline; }
    .ds-desc { color: #94a3b8; font-size: 0.95rem; }

    /* DragonTube */
    .dt-header { background: #111827; color: white; padding: 15px; font-weight: bold; font-size: 1.5rem; display: flex; align-items: center; gap:10px; border-bottom: 1px solid var(--border); }
    .dt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; background: #030712; min-height: 100vh;}
    .dt-card { cursor: pointer; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; transition: all 0.2s; }
    .dt-card:hover { transform: translateY(-5px); border-color: #38bdf8; background: rgba(56,189,248,0.05); }
    .dt-thumb { height: 140px; border-radius: 8px; margin-bottom: 10px; display:flex; align-items:center; justify-content:center; font-size: 3rem; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
    .dt-title { color: white; font-weight: bold; font-size: 1rem;}
    .dt-channel { color: #94a3b8; font-size: 0.9rem;}

    .dt-player-container { padding: 20px; background: #030712; color: white; min-height: 100vh;}
    .dt-player { width: 100%; max-width: 800px; height: 450px; background: black; margin: 0 auto 20px auto; display:flex; align-items:center; justify-content:center; color:white; font-size:2rem; animation: pulse 2s infinite;}
    
    @keyframes pulse { 0% { background: #111; } 50% { background: #333; } 100% { background: #111; } }

    /* DragonWiki */
    .dw-header { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 20px; font-size: 2rem; font-family: serif;}
    .dw-content { font-family: sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(10px); padding: 40px; border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; }
    .dw-infobox { float: right; width: 250px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1); padding: 10px; margin-left: 20px; font-size: 0.9rem; border-radius: 8px;}
    
    /* Daily Dragon News */
    .dn-header { text-align: center; font-family: "Times New Roman", serif; border-bottom: 4px double rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 20px; }
    .dn-title { font-size: 4rem; text-transform: uppercase; margin: 0; color: #fff;}
    .dn-date { font-style: italic; color: #94a3b8;}
    .dn-article { max-width: 800px; margin: 0 auto; columns: 2; column-gap: 40px; font-family: serif; line-height: 1.6; text-align: justify; color: #e2e8f0; }
    .dn-headline { font-size: 2.5rem; column-span: all; text-align: center; margin-bottom: 20px; font-weight: bold; color: #fff; }

    /* Dragon Weather */
    .dwx-bg { background: linear-gradient(to bottom, #0f172a 0%, #1e1b4b 100%); color: white; padding: 50px; text-align: center; min-height: 100vh;}
    .dwx-temp { font-size: 8rem; font-weight: bold; margin: 20px 0; text-shadow: 0 0 30px rgba(255,255,255,0.2); }
    .dwx-desc { font-size: 2rem; }
    
  </style>
</head>
<body>

  <a href="index.html" style="position: absolute; top: 1rem; left: 1rem; text-decoration: none; font-size: 1.2rem; color: var(--accent); z-index: 100;">← Back Home</a>

  <div id="browser-window">
    <div id="browser-header">
      <button class="browser-btn" onclick="window.browserBack()" title="Back">◀</button>
      <button class="browser-btn" onclick="window.browserForward()" title="Forward">▶</button>
      <button class="browser-btn" onclick="window.navigate('dragon://search')" title="Home">🏠</button>
      <input type="text" id="browser-url" value="dragon://search" readonly>
    </div>
    <div id="browser-content">
      <!-- Content injected by JS -->
    </div>
  </div>

  <script src="assets/js/internet.js"></script>
</body>
</html>
