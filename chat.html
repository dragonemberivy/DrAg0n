<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Chat - DrAg0n</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
  <div onclick="window.findEgg('egg4', this)" style="position:absolute; bottom:150px; right:50px; font-size:0.5rem; cursor:pointer; z-index:10; opacity:0.1;">🪙</div>

  <!-- THEME TOGGLE -->
  <div id="theme-toggle" style="position: fixed; top: 2rem; right: 200px; font-size: 1.5rem; cursor: pointer; z-index: 100000; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 50%; border: 1px solid var(--border); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">🌙</div>

  <!-- LOFI PLAYER -->
  <div id="lofi-player" class="glass-card" style="position:fixed; bottom:20px; right:20px; padding:10px 15px; display:flex; align-items:center; gap:10px; z-index:99999; border-radius: 30px;">
    <span style="font-size:1.2rem;">🎧</span>
    <audio id="lofi-audio" loop>
      <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=lofi-study-112191.mp3" type="audio/mpeg">
    </audio>
    <button id="lofi-play" style="padding:5px 12px; font-size:0.8rem; border-radius: 20px;">Play</button>
  </div>

  <!-- HEADER -->
  <header style="padding: 2rem 1rem;">
    <a href="index.html" style="position: absolute; top: 2rem; left: 2rem; text-decoration: none; font-size: 1.2rem; color: var(--accent);">← Back Home</a>
    <h1 style="font-size: 3rem;"><span class="gradient-text">Animal Chat</span></h1>
    <p style="font-size: 1.25rem; color: var(--text-muted); max-width: 600px; margin: 0 auto;">
      Connect with other animals in the wild!
    </p>
  </header>

  <main class="container">
    <!-- ANIMAL CHATROOM SECTION -->
    <section id="chat-section">
      <div class="glass-card" style="max-width: 600px; margin: 0 auto; border-color: rgba(56, 189, 248, 0.4);">
        <div style="display: flex; gap: 10px; margin-bottom: 1rem;">
          <select id="chat-room-select" style="flex:1; margin:0;">
            <option value="" disabled selected>Select Room</option>
            <option value="Forest">Forest</option>
            <option value="Cave">Cave</option>
            <option value="Ocean">Ocean</option>
          </select>
          <select id="chat-profile-select" style="flex:1; margin:0;" disabled>
            <option value="" disabled selected>Select Animal</option>
            <option value="Dragon">Dragon</option>
            <option value="Cat">Cat</option>
            <option value="Dog">Dog</option>
            <option value="Kitsune">Kitsune</option>
          </select>
        </div>

        <div id="chat-messages">
          <div style="text-align: center; color: var(--text-muted); margin-top: 120px;">
            Select a room and profile to join the chat.
          </div>
        </div>

        <div style="display: flex; gap: 10px;">
          <input type="text" id="chat-input-field" placeholder="Select room & profile first..."
            style="margin:0; flex: 1;" disabled>
          <button id="chat-send-btn" disabled>Send</button>
        </div>
      </div>
    </section>
  </main>

  <!-- PASSWORD MODAL -->
  <div id="password-modal"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10001; align-items:center; justify-content:center; backdrop-filter:blur(5px);">
    <div class="glass-card"
      style="text-align:center; min-width: 300px; transform: scale(1); box-shadow: 0 10px 40px rgba(56, 189, 248, 0.2);">
      <h3 id="modal-title" style="margin-bottom: 1rem;">Enter Password</h3>
      <input type="password" id="modal-pw-input" placeholder="Password..." style="margin-bottom:1rem; width:100%;">
      <p id="modal-error" style="color: #ef4444; font-size: 0.9rem; margin-bottom: 1rem; display:none;">Wrong password!
      </p>
      <div style="display:flex; gap:10px; justify-content:center;">
        <button id="modal-join-btn" style="flex:1;">Join</button>
        <button id="modal-cancel-btn" style="flex:1; background:rgba(255,255,255,0.1);">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- Main scripts -->
  <script src="assets/js/main.js"></script>
</body>

</html>
