<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Chat - DrAg0n</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
  <div onclick="window.findEgg('egg4', this)" style="position:absolute; bottom:150px; right:50px; font-size:0.5rem; cursor:pointer; z-index:10; opacity:0.1;">🪙</div>

  <!-- THEME TOGGLE -->
  <div id="theme-toggle" style="position: fixed; top: 2rem; right: 200px; font-size: 1.5rem; cursor: pointer; z-index: 100000; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 50%; border: 1px solid var(--border); width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">🌙</div>

  <!-- GLOBAL JUKEBOX -->
  <div id="lofi-player" class="glass-card" style="position:fixed; bottom:20px; right:20px; width:300px; padding:15px; display:flex; flex-direction:column; gap:10px; z-index:99999; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <strong style="color:var(--accent); font-size:1.1rem;">🎧 Global Jukebox</strong>
      <button onclick="document.getElementById('lofi-player').style.display='none'" style="background:transparent; border:none; color:var(--text-muted); cursor:pointer;">&times;</button>
    </div>
    <iframe id="jukebox-iframe" width="100%" height="80" src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=0&loop=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen style="border-radius:8px;"></iframe>
    <div style="display:flex; flex-direction:column; gap:5px; margin-top:5px;">
      <select id="jukebox-preset" style="padding:5px; background:rgba(0,0,0,0.5); border:1px solid var(--border); color:white; border-radius:4px; font-size:0.8rem;" onchange="document.getElementById('jukebox-input').value = this.value;">
        <option value="" disabled selected>Select a song...</option>
        <option value="E0Fm2-2XfBQ">Master of Puppets (Instrumental)</option>
        <option value="P2KRKxAb2ek">Bhool Bhulaiyaa 2 Title Track</option>
        <option value="jfKfPfyJRdk">Lofi Girl Radio</option>
      </select>
      <div style="display:flex; gap:5px;">
        <input type="text" id="jukebox-input" placeholder="Custom YouTube ID..." style="flex:1; padding:5px; background:rgba(0,0,0,0.5); border:1px solid var(--border); color:white; border-radius:4px; font-size:0.8rem;">
        <button onclick="window.queueSong()" style="background:var(--accent); border:none; padding:5px; color:white; border-radius:4px; cursor:pointer; font-size:0.8rem; font-weight:bold;">Queue (50 DC)</button>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header style="padding: 2rem 1rem;">
    <a href="index.html" style="position: absolute; top: 2rem; left: 2rem; text-decoration: none; font-size: 1.2rem; color: var(--accent);">← Back Home</a>
    <h1 style="font-size: 3rem;"><span class="gradient-text">Animal Chat</span></h1>
    <p style="font-size: 1.25rem; color: var(--text-muted); max-width: 600px; margin: 0 auto;">
      Connect with other animals in the wild!
    </p>
  </header>

  <main class="container">
    <!-- ANIMAL CHATROOM SECTION -->
    <section id="chat-section">
      <div class="glass-card" style="max-width: 600px; margin: 0 auto; border-color: rgba(56, 189, 248, 0.4);">
        <div style="display: flex; gap: 10px; margin-bottom: 1rem;">
          <select id="chat-room-select" style="flex:1; margin:0;">
            <option value="" disabled selected>Select Room</option>
            <option value="Forest">Forest</option>
            <option value="Cave">Cave</option>
            <option value="Ocean">Ocean</option>
          </select>
          <select id="chat-profile-select" style="flex:1; margin:0;" disabled>
            <option value="" disabled selected>Select Animal</option>
            <option value="Dragon">Dragon</option>
            <option value="Cat">Cat</option>
            <option value="Dog">Dog</option>
            <option value="Kitsune">Kitsune</option>
          </select>
        </div>

        <div id="chat-messages">
          <div style="text-align: center; color: var(--text-muted); margin-top: 120px;">
            Select a room and profile to join the chat.
          </div>
        </div>

        <div style="display: flex; gap: 10px;">
          <input type="text" id="chat-input-field" placeholder="Select room & profile first..."
            style="margin:0; flex: 1;" disabled>
          <button id="chat-send-btn" disabled>Send</button>
        </div>
      </div>
    </section>
  </main>

  <!-- PASSWORD MODAL -->
  <div id="password-modal"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10001; align-items:center; justify-content:center; backdrop-filter:blur(5px);">
    <div class="glass-card"
      style="text-align:center; min-width: 300px; transform: scale(1); box-shadow: 0 10px 40px rgba(56, 189, 248, 0.2);">
      <h3 id="modal-title" style="margin-bottom: 1rem;">Enter Password</h3>
      <input type="password" id="modal-pw-input" placeholder="Password..." style="margin-bottom:1rem; width:100%;">
      <p id="modal-error" style="color: #ef4444; font-size: 0.9rem; margin-bottom: 1rem; display:none;">Wrong password!
      </p>
      <div style="display:flex; gap:10px; justify-content:center;">
        <button id="modal-join-btn" style="flex:1;">Join</button>
        <button id="modal-cancel-btn" style="flex:1; background:rgba(255,255,255,0.1);">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- Main scripts -->
  <script src="assets/js/main.js?v=3"></script>

  <!-- DIRECT MESSAGING MODAL -->
  <div id="dm-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:200000; align-items:center; justify-content:center;">
    <div class="glass-card" style="width: 90%; max-width: 500px; padding: 2rem; border-color: rgba(168, 85, 247, 0.4);">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h2 style="margin: 0; color: #a855f7;">DM: <span id="dm-target-user" style="color:white;"></span></h2>
        <button onclick="document.getElementById('dm-modal').style.display='none';" style="background:transparent; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
      </div>
      
      <div id="dm-messages-container" class="messages-container" style="height: 300px; border: 1px solid var(--border); padding: 10px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 8px; margin-bottom: 1rem; text-align: left;">
        <!-- DM messages load here -->
      </div>
      
      <form id="dm-form" style="display: flex; gap: 10px;">
        <input type="text" id="dm-input" placeholder="Type a private message..." required style="flex:1; padding:10px; background:rgba(0,0,0,0.5); border:1px solid #a855f7; color:white; border-radius:8px;">
        <button type="submit" style="padding:10px 20px; background:#a855f7; border:none; color:white; font-weight:bold; border-radius:8px; cursor:pointer;">Send</button>
      </form>
    </div>
  </div>

</body>

</html>
