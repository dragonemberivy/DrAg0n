<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - DrAg0n</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
      max-height: 200px;
      overflow-y: auto;
      padding: 10px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .avatar-option {
      font-size: 2rem;
      text-align: center;
      cursor: pointer;
      padding: 10px;
      border-radius: 12px;
      transition: all 0.2s;
      border: 2px solid transparent;
      user-select: none;
    }
    .avatar-option:hover {
      background: rgba(255,255,255,0.1);
      transform: scale(1.1);
    }
    .avatar-option.selected {
      border-color: var(--accent);
      background: rgba(56, 189, 248, 0.2);
      transform: scale(1.1);
    }
    #preview-avatar {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: inline-block;
      width: 100px;
      height: 100px;
      line-height: 100px;
      border-radius: 50%;
      background: rgba(0,0,0,0.3);
      border: 2px solid var(--border);
    }
    #preview-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
  </style>
</head>

<body>
  <header style="padding: 2rem 1rem;">
    <h1 style="font-size: 3rem;"><span class="gradient-text">Claim Your Name</span></h1>
    <p style="font-size: 1.25rem; color: var(--text-muted); max-width: 600px; margin: 0 auto;">
      No passwords, no emails, no hassle. Pick your identity and enter the universe.
    </p>
  </header>

  <main class="container">
    <div class="glass-card" style="max-width: 500px; margin: 0 auto; text-align: center;">
      <div id="preview-avatar">✨</div>
      
      <h3 style="text-align: left; margin-bottom: 0.5rem; font-size: 1rem;">1. Choose a Username</h3>
      <input type="text" id="username-input" placeholder="e.g. StarDragon99" maxlength="20" style="text-align: center; font-weight: bold; font-size: 1.2rem;">
      <p id="username-error" style="color: #ef4444; font-size: 0.9rem; margin-top: -10px; margin-bottom: 15px; display: none; text-align: left;">Username taken!</p>

      <h3 style="text-align: left; margin-bottom: 0.5rem; font-size: 1rem;">2. Pick an Avatar or Upload One</h3>
      
      <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
        <button onclick="document.getElementById('avatar-upload').click()" style="flex: 1; font-size: 0.9rem; padding: 0.5rem;">Upload Image</button>
      </div>

      <div class="avatar-grid" id="emoji-grid">
        <!-- Emojis will be generated by JS -->
      </div>

      <button id="create-account-btn" style="width: 100%; font-size: 1.2rem; padding: 15px; margin-top: 1rem;">Enter Website</button>
    </div>
  </main>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- Main Scripts -->
  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Check if already registered
      if (localStorage.getItem('drag0n_user')) {
        window.location.href = 'index.html';
      }

      const emojis = ['🦊', '🐉', '🐱', '🐶', '🐙', '🐼', '🐨', '🐸', '🦁', '🐯', '🐰', '🐹', '🐻', '🐷', '🦄', '🐝', '🐢', '🐍', '🦕', '🦖', '🦈', '🐬', '🐧', '🦉', '🦋'];
      const grid = document.getElementById('emoji-grid');
      const preview = document.getElementById('preview-avatar');
      let selectedAvatar = '✨';

      emojis.forEach(e => {
        const div = document.createElement('div');
        div.className = 'avatar-option';
        div.textContent = e;
        div.onclick = () => {
          document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
          div.classList.add('selected');
          selectedAvatar = e;
          preview.textContent = e;
          preview.innerHTML = '';
          preview.textContent = e;
        };
        grid.appendChild(div);
      });

      // Handle Image Upload
      document.getElementById('avatar-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(event) {
          // Compress image using canvas
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            const max_size = 150;
            let width = img.width;
            let height = img.height;
            if (width > height) {
              if (width > max_size) {
                height *= max_size / width;
                width = max_size;
              }
            } else {
              if (height > max_size) {
                width *= max_size / height;
                height = max_size;
              }
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            selectedAvatar = dataUrl;
            preview.innerHTML = `<img src="${dataUrl}">`;
            document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      });

      // Submit logic
      document.getElementById('create-account-btn').addEventListener('click', async () => {
        const username = document.getElementById('username-input').value.trim();
        const errorEl = document.getElementById('username-error');
        const btn = document.getElementById('create-account-btn');
        
        if (!username) {
          errorEl.textContent = "Please enter a username!";
          errorEl.style.display = 'block';
          return;
        }

        // Validate characters (alphanumeric)
        if (!/^[a-zA-Z0-9_]+$/.test(username)) {
          errorEl.textContent = "Letters, numbers, and underscores only!";
          errorEl.style.display = 'block';
          return;
        }

        btn.disabled = true;
        btn.textContent = "Checking...";

        try {
          const userRef = firebase.database().ref('users/' + username.toLowerCase());
          const snapshot = await userRef.once('value');
          
          if (snapshot.exists()) {
            errorEl.textContent = "Username is already taken!";
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.textContent = "Enter Website";
          } else {
            // Claim it
            await userRef.set({
              username: username,
              avatar: selectedAvatar,
              created_at: Date.now()
            });
            
            localStorage.setItem('drag0n_user', username);
            localStorage.setItem('drag0n_avatar', selectedAvatar);
            
            window.location.href = 'index.html';
          }
        } catch(e) {
          errorEl.textContent = "Network error. Try again.";
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = "Enter Website";
        }
      });
    });
  </script>
</body>
</html>
