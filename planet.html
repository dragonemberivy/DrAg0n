<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planet Generator - DrAg0n</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body {
      background: radial-gradient(circle at center, #0f172a, #000);
      overflow: hidden;
    }
    
    #planet-container {
      position: absolute;
      top: 50%;
      left: 30%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    #planet-canvas {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 50px rgba(255, 255, 255, 0.2));
    }

    #stats-panel {
      position: absolute;
      top: 50%;
      right: 10%;
      transform: translateY(-50%);
      width: 400px;
      padding: 30px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    
    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .stat-label {
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }
    
    .stat-value {
      color: white;
      font-weight: 800;
      text-align: right;
    }

    #starfield {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
    }
  </style>
</head>
<body>

  <canvas id="starfield"></canvas>

  <a href="index.html" style="position: absolute; top: 2rem; left: 2rem; text-decoration: none; font-size: 1.2rem; color: var(--accent); z-index: 100;">← Back Home</a>

  <div id="planet-container">
    <canvas id="planet-canvas" width="600" height="600"></canvas>
  </div>

  <div id="stats-panel" class="glass-card">
    <h2 id="planet-name" style="font-size: 2.5rem; margin-bottom: 5px; background: linear-gradient(45deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Visitor's Planet</h2>
    <p style="color: var(--text-muted); margin-bottom: 30px; font-style: italic;">A completely unique world, born from a name.</p>
    
    <div class="stat-row">
      <span class="stat-label">Size Class</span>
      <span class="stat-value" id="stat-size">Analyzing...</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Gravity</span>
      <span class="stat-value" id="stat-gravity">Analyzing...</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Flora</span>
      <span class="stat-value" id="stat-trees">Analyzing...</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Fauna</span>
      <span class="stat-value" id="stat-creatures">Analyzing...</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Hydrosphere</span>
      <span class="stat-value" id="stat-rivers">Analyzing...</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Atmosphere</span>
      <span class="stat-value" id="stat-sky">Analyzing...</span>
    </div>
    <div class="stat-row" style="border-bottom: none; margin-bottom: 0; padding-bottom: 0;">
      <span class="stat-label">Moons</span>
      <span class="stat-value" id="stat-moons">Analyzing...</span>
    </div>
  </div>

  <script src="assets/js/planet.js"></script>
</body>
</html>
