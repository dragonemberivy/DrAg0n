<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crimson Tides - Expanded</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        canvas { display: block; }
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 20px; box-sizing: border-box; font-family: 'Georgia', serif;
            color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #top-bar { display: flex; justify-content: space-between; font-size: 24px; }
        #bottom-bar { display: flex; justify-content: space-between; font-size: 18px; align-items: flex-end;}
        .hud-element { background: rgba(0, 0, 0, 0.4); padding: 10px 20px; border-radius: 8px; border: 1px solid #cda434; margin-bottom: 5px;}
        #shop-ui {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid #cda434; pointer-events: auto; text-align: center; border-radius: 10px;
        }
        button { background: #8b4513; color: white; border: 1px solid #cda434; padding: 10px; cursor: pointer; font-size: 16px; margin: 5px; display: block; width: 100%;}
        button:hover { background: #a0522d; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="top-bar">
            <div>
                <div class="hud-element" id="health-ui">Hull: 100/100</div>
                <div class="hud-element" id="wind-ui">Wind: East</div>
                <div class="hud-element" id="reload-ui">Cannons: READY</div>
            </div>
            <div>
                <div class="hud-element" id="gold-ui">Gold: 0</div>
                <div class="hud-element" id="bounty-ui">Bounty Level: 0</div>
                <canvas id="minimap" width="150" height="150" style="border: 2px solid #cda434; border-radius: 50%; background: rgba(0,0,0,0.5); margin-top: 10px;"></canvas>
            </div>
        </div>
        <div id="bottom-bar">
            <div class="hud-element">Sails: <span id="sails-ui">0%</span><br>Speed: <span id="speed-ui">0</span></div>
            <div class="hud-element" id="crew-ui">Crew: 5</div>
            <div class="hud-element">Controls: W/S (Sails), A/D (Steer), SPACE (Fire)<br>Press E at Outposts to Shop</div>
        </div>
    </div>
    <div id="shop-ui">
        <h2>Pirate Outpost Shop</h2>
        <p>Current Gold: <span id="shop-gold">0</span></p>
        <button id="repair-btn">Repair Hull (50 Gold)</button>
        <button id="upgrade-hull-btn">Upgrade Max Hull (150 Gold)</button>
        <button id="upgrade-cannon-btn">Upgrade Cannons (200 Gold)</button>
        <button id="upgrade-sail-btn">Upgrade Sails (150 Gold)</button>
        <button id="hire-crew-btn">Hire Crew (100 Gold)</button>
        <button id="close-shop-btn" style="background: #333;">Close Shop</button>
    </div>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
